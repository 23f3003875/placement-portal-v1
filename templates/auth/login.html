{% extends "base.html" %}
{% block title %}Login - Placement Portal{% endblock %}
{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card p-4" style="width:100%;max-width:420px;">
    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill display-5 text-primary"></i>
      <h3 class="fw-bold mt-2">Sign In</h3>
    </div>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login
      </button>
    </form>
    <hr>
    <p class="text-center text-muted small mb-2">
      Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
    <div class="alert alert-info small mb-0">
      <strong>Admin demo:</strong> admin@placement.com / admin123
    </div>
  </div>
</div>
{% endblock %}
