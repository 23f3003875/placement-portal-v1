{% extends "base.html" %}
{% block title %}Company Profile{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-3 d-none d-md-block">
      <p class="text-white-50 small fw-bold text-uppercase px-2 mb-1">Company Menu</p>
      <a href="{{ url_for('company_dashboard') }}"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
      <a href="{{ url_for('company_profile') }}" class="active"><i class="bi bi-building me-2"></i>Profile</a>
      <a href="{{ url_for('company_create_drive') }}"><i class="bi bi-plus-circle me-2"></i>Post Drive</a>
      <hr style="border-color:#444;">
      <a href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </div>
    <div class="col-md-10 p-4">
      <h2 class="fw-bold mb-4"><i class="bi bi-building me-2 text-success"></i>Company Profile</h2>
      <div class="card" style="max-width:600px;">
        <div class="card-body">
          <form method="POST" action="{{ url_for('company_profile') }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Contact Person Name</label>
              <input type="text" name="name" class="form-control" value="{{ session['user_name'] }}">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Company Name</label>
              <input type="text" class="form-control" value="{{ profile['company_name'] }}" disabled>
              <div class="form-text">Company name cannot be changed. Contact admin.</div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">HR Contact</label>
              <input type="text" name="hr_contact" class="form-control" value="{{ profile['hr_contact'] or '' }}">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Website</label>
              <input type="url" name="website" class="form-control" value="{{ profile['website'] or '' }}" placeholder="https://...">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Industry</label>
              <input type="text" name="industry" class="form-control" value="{{ profile['industry'] or '' }}">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Company Description</label>
              <textarea name="description" class="form-control" rows="4">{{ profile['description'] or '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save Changes</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
