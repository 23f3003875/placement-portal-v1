{% extends "base.html" %}
{% block title %}Edit Drive{% endblock %}
{% block content %}
<div class="container-fluid">
  <div class="row">
    <div class="col-md-2 sidebar p-3 d-none d-md-block">
      <p class="text-white-50 small fw-bold text-uppercase px-2 mb-1">Company Menu</p>
      <a href="{{ url_for('company_dashboard') }}" class="active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a>
      <a href="{{ url_for('company_profile') }}"><i class="bi bi-building me-2"></i>Profile</a>
      <a href="{{ url_for('company_create_drive') }}"><i class="bi bi-plus-circle me-2"></i>Post Drive</a>
      <hr style="border-color:#444;">
      <a href="{{ url_for('logout') }}"><i class="bi bi-box-arrow-right me-2"></i>Logout</a>
    </div>
    <div class="col-md-10 p-4">
      <h2 class="fw-bold mb-4"><i class="bi bi-pencil me-2 text-warning"></i>Edit Drive</h2>
      <div class="card" style="max-width:700px;">
        <div class="card-body">
          <form method="POST" action="{{ url_for('company_edit_drive', did=drive['id']) }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Job Title <span class="text-danger">*</span></label>
              <input type="text" name="job_title" class="form-control" value="{{ drive['job_title'] }}" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Job Description <span class="text-danger">*</span></label>
              <textarea name="job_description" class="form-control" rows="5" required>{{ drive['job_description'] }}</textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Eligibility Criteria</label>
              <textarea name="eligibility_criteria" class="form-control" rows="3">{{ drive['eligibility_criteria'] or '' }}</textarea>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Package</label>
                <input type="text" name="package" class="form-control" value="{{ drive['package'] or '' }}">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Location</label>
                <input type="text" name="location" class="form-control" value="{{ drive['location'] or '' }}">
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Application Deadline <span class="text-danger">*</span></label>
              <input type="date" name="application_deadline" class="form-control"
                     value="{{ drive['application_deadline'] }}" required>
            </div>
            <div class="alert alert-warning small">
              <i class="bi bi-exclamation-triangle me-1"></i>
              Saving will reset the drive to <strong>Pending</strong> for re-approval.
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-warning"><i class="bi bi-save me-1"></i>Save and Resubmit</button>
              <a href="{{ url_for('company_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
